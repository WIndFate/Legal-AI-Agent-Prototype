app = "contractguard-prod"
primary_region = "nrt"  # Tokyo — closest to Japan users

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8000"
  FRONTEND_URL = "https://contract-checker.vercel.app"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  # SSE streaming requires long-lived connections
  [http_service.http_options]
    response_header_timeout = 300

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
